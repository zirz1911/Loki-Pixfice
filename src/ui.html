<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maw — Multi-Agent Workflow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4e; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; }

  .header { padding: 10px 20px; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 16px; color: #64b5f6; font-weight: 500; }
  .header .target-name { font-size: 13px; color: #888; }
  .header .status { font-size: 12px; margin-left: auto; }
  .header .status.online { color: #4caf50; }
  .header .status.offline { color: #f44336; }
  .header .nav-links { display: flex; gap: 16px; margin-left: 16px; font-size: 14px; }
  .header .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
  .header .nav-links a:hover { color: rgba(255,255,255,0.8); }
  .header .nav-links a.active { color: #26c6da; font-weight: bold; }

  .container { display: flex; height: calc(100vh - 45px); }

  .sidebar { width: 220px; border-right: 1px solid #1a1a2e; overflow-y: auto; flex-shrink: 0; }
  .session { margin: 4px 0; }
  .session-name { padding: 5px 16px; font-size: 10px; text-transform: uppercase; color: #444; letter-spacing: 1px; }
  .window {
    padding: 6px 12px 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.1s; border-left: 3px solid transparent; margin: 1px 0;
  }
  .window:hover { background: #1a1a2e; border-left-color: #333; }
  .window.selected { background: #1a1a3e; border-left-color: #64b5f6; }
  .window .idx { color: #555; font-size: 11px; width: 16px; text-align: right; }
  .window .name { color: #999; font-size: 12px; }
  .window:hover .name { color: #fff; }
  .window.selected .name { color: #64b5f6; font-weight: bold; }
  .window .dot { width: 6px; height: 6px; border-radius: 50%; background: #222; margin-left: auto; flex-shrink: 0; }
  .window .dot.active { background: #4caf50; box-shadow: 0 0 4px #4caf50; }

  /* Terminal pane — the whole right side */
  .term {
    flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
    cursor: text;
  }
  .term:focus { outline: none; }
  .term-output {
    flex: 1; padding: 8px 12px; overflow-y: auto;
    background: #0a0a0f; font-size: 13px; line-height: 1.45;
    white-space: pre-wrap; word-break: break-all; color: #aaa; line-height: 1.35;
  }
  .term-output .placeholder { color: #333; text-align: center; margin-top: 30vh; font-size: 14px; }

  /* Typing indicator at bottom */
  .term-input-line {
    padding: 6px 12px; border-top: 1px solid #1a1a2e; background: #0d0d14;
    font-size: 13px; min-height: 28px; display: flex; align-items: center;
    color: #64b5f6;
  }
  .term-input-line .prompt { color: #555; margin-right: 6px; }
  .term-input-line .text { color: #e0e0e0; white-space: pre; }
  .term-input-line .cursor {
    display: inline-block; width: 7px; height: 15px; background: #64b5f6;
    animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 1px;
  }
  .term-input-line.empty .cursor { background: #333; }
  .term-input-line .clear-btn {
    margin-left: auto; color: #555; cursor: pointer; font-size: 11px;
    padding: 2px 8px; border-radius: 3px; user-select: none;
  }
  .term-input-line .clear-btn:hover { color: #f44336; background: #1a1a2e; }
  .term-input-line.empty .clear-btn { display: none; }
  .term-input-line .queue-count {
    margin-left: 8px; color: #555; font-size: 11px;
  }
  .term-input-line.empty .queue-count { display: none; }
  @keyframes blink { 50% { opacity: 0; } }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: #1a3a1a;
    color: #4caf50; padding: 8px 14px; border-radius: 6px; font-size: 12px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.error { background: #3a1a1a; color: #f44336; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>maw <span style="color:#555;font-weight:400;font-size:12px">by cat lab</span></h1>
  <span class="target-name" id="targetName"></span>
  <span class="status offline" id="status">connecting...</span>
  <div class="nav-links">
    <a href="/office/#office">Office</a>
    <a href="/office/#mission">Mission</a>
    <a href="/" class="active">Terminal</a>
    <a href="/dashboard">Orbital</a>
  </div>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="term" id="term" tabindex="0">
    <div class="term-output" id="output"><div class="placeholder">select a window &larr;</div></div>
    <div class="term-input-line empty" id="inputLine">
      <span class="prompt">&gt;</span>
      <span class="text" id="inputText"></span><span class="cursor"></span>
      <span class="queue-count" id="queueCount"></span>
      <span class="clear-btn" id="clearBtn">esc</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ANSI
const AC = ['#000','#c00','#0a0','#c50','#00c','#c0c','#0cc','#ccc','#555','#f55','#5f5','#ff5','#55f','#f5f','#5ff','#fff'];
function a256(n) {
  if (n < 16) return AC[n];
  if (n < 232) { n -= 16; return `rgb(${Math.floor(n/36)*51},${Math.floor(n/6)%6*51},${n%6*51})`; }
  const v = (n-232)*10+8; return `rgb(${v},${v},${v})`;
}
function ansi(text) {
  let h='',fg=null,bg=null,b=0,d=0,i=0,u=0,s=0,open=0;
  for (const p of text.split(/(\x1b\[[0-9;]*m)/)) {
    const m = p.match(/^\x1b\[([0-9;]*)m$/);
    if (!m) { h += esc(p); continue; }
    if (open) { h += '</span>'; open = 0; }
    const codes = m[1] ? m[1].split(';').map(Number) : [0];
    for (let j=0; j<codes.length; j++) {
      const c=codes[j];
      if (!c) { fg=bg=null; b=d=i=u=s=0; }
      else if (c===1) b=1; else if (c===2) d=1; else if (c===3) i=1;
      else if (c===4) u=1; else if (c===9) s=1;
      else if (c===22) b=d=0; else if (c===23) i=0; else if (c===24) u=0; else if (c===29) s=0;
      else if (c>=30&&c<=37) fg=AC[c-30];
      else if (c===38&&codes[j+1]===5) { fg=a256(codes[j+2]); j+=2; }
      else if (c===38&&codes[j+1]===2) { fg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===39) fg=null;
      else if (c>=40&&c<=47) bg=AC[c-40];
      else if (c===48&&codes[j+1]===5) { bg=a256(codes[j+2]); j+=2; }
      else if (c===48&&codes[j+1]===2) { bg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===49) bg=null;
      else if (c>=90&&c<=97) fg=AC[c-82];
      else if (c>=100&&c<=107) bg=AC[c-92];
    }
    const st=[];
    if (fg) st.push('color:'+fg); if (bg) st.push('background:'+bg+';display:inline;padding:1px 0;box-decoration-break:clone;-webkit-box-decoration-break:clone');
    if (b) st.push('font-weight:bold'); if (d) st.push('opacity:0.6');
    if (i) st.push('font-style:italic');
    if (u||s) st.push('text-decoration:'+(u?'underline':'')+(u&&s?' ':'')+(s?'line-through':''));
    if (st.length) { h += `<span style="${st.join(';')}">`; open=1; }
  }
  if (open) h += '</span>';
  return h;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// State
let ws = null, selectedTarget = null, inputBuf = '', lastSessions = '';

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    el('status').textContent = 'live';
    el('status').className = 'status online';
    if (selectedTarget) ws.send(JSON.stringify({ type: 'subscribe', target: selectedTarget }));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'sessions') renderSidebar(data.sessions);
    else if (data.type === 'capture') {
      const out = el('output');
      const atBottom = out.scrollHeight - out.scrollTop - out.clientHeight < 60;
      out.innerHTML = ansi(data.content || '(empty)');
      if (atBottom) out.scrollTop = out.scrollHeight;
    }
    else if (data.type === 'sent') showToast('sent');
    else if (data.type === 'error') showToast(data.error, true);
  };
  ws.onclose = () => {
    el('status').textContent = 'reconnecting...';
    el('status').className = 'status offline';
    setTimeout(connect, 1000);
  };
  ws.onerror = () => ws.close();
}

function el(id) { return document.getElementById(id); }

// Sidebar
function renderSidebar(sessions) {
  const json = JSON.stringify(sessions);
  if (lastSessions === json) {
    document.querySelectorAll('.window').forEach(e => e.classList.toggle('selected', e.dataset.target === selectedTarget));
    return;
  }
  lastSessions = json;
  const sb = el('sidebar');
  sb.innerHTML = sessions.map(s => `<div class="session">
    <div class="session-name">${esc(s.name)}</div>
    ${s.windows.map(w => {
      const t = s.name+':'+w.index;
      return `<div class="window ${selectedTarget===t?'selected':''}" data-target="${t}" data-name="${esc(w.name)}">
        <span class="idx">${w.index}</span><span class="name">${esc(w.name)}</span>
        <span class="dot ${w.active?'active':''}"></span></div>`;
    }).join('')}</div>`).join('');
  sb.querySelectorAll('.window').forEach(e => e.addEventListener('click', () => selectWindow(e.dataset.target, e.dataset.name)));
}

function selectWindow(target, name) {
  selectedTarget = target;
  inputBuf = '';
  updateInputLine();
  el('targetName').textContent = name;
  el('output').innerHTML = '<div class="placeholder">connecting...</div>';
  document.querySelectorAll('.window').forEach(e => e.classList.toggle('selected', e.dataset.target === target));
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'subscribe', target }));
    ws.send(JSON.stringify({ type: 'select', target }));
  }
  el('term').focus();
  // Persist selection in URL hash
  location.hash = encodeURIComponent(target);
}

// Keyboard → tmux (queue-based)
let sendQueue = [];
let sending = false;

function updateInputLine() {
  el('inputText').textContent = inputBuf;
  const hasContent = inputBuf || sendQueue.length;
  el('inputLine').classList.toggle('empty', !hasContent && !selectedTarget);
  el('queueCount').textContent = sendQueue.length ? `(${sendQueue.length} queued)` : '';
}

async function flushQueue() {
  if (sending || !ws || ws.readyState !== 1) return;
  sending = true;
  while (sendQueue.length > 0) {
    const text = sendQueue.shift();
    ws.send(JSON.stringify({ type: 'send', target: selectedTarget, text }));
    updateInputLine();
    // Small delay between queued sends so tmux can process
    await new Promise(r => setTimeout(r, 100));
  }
  sending = false;
}

function queueSend(text) {
  if (!text || !selectedTarget) return;
  sendQueue.push(text);
  updateInputLine();
  flushQueue();
}

function clearInput() {
  inputBuf = '';
  sendQueue = [];
  updateInputLine();
}

el('term').addEventListener('keydown', (e) => {
  // Alt+Arrow to navigate between windows in same session
  if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    if (!selectedTarget) return;
    const wins = [...document.querySelectorAll('.window')].map(el => ({ target: el.dataset.target, name: el.dataset.name }));
    const idx = wins.findIndex(w => w.target === selectedTarget);
    if (idx < 0) return;
    const dir = e.key === 'ArrowLeft' ? -1 : 1;
    const next = wins[(idx + dir + wins.length) % wins.length];
    selectWindow(next.target, next.name);
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'select', target: next.target }));
    return;
  }

  if (!selectedTarget || !ws || ws.readyState !== 1) return;

  if (e.key === 'Enter') {
    e.preventDefault();
    if (inputBuf) {
      queueSend(inputBuf);
      inputBuf = '';
      updateInputLine();
    }
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    if (e.metaKey || e.ctrlKey) {
      // Cmd+Backspace or Ctrl+Backspace = clear whole line
      inputBuf = '';
    } else {
      inputBuf = inputBuf.slice(0, -1);
    }
    updateInputLine();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    clearInput();
  } else if (e.key === 'c' && e.ctrlKey) {
    // Ctrl+C = clear
    e.preventDefault();
    clearInput();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    queueSend(inputBuf + '\t');
    inputBuf = '';
    updateInputLine();
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    inputBuf += e.key;
    updateInputLine();
  }
});

// Clear button
el('clearBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  clearInput();
  el('term').focus();
});

// Keep focus on term
el('term').addEventListener('click', () => el('term').focus());

function showToast(msg, error = false) {
  const t = el('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 1500);
}

// Restore selection from URL hash
if (location.hash) {
  const saved = decodeURIComponent(location.hash.slice(1));
  if (saved) { selectedTarget = saved; }
}
connect();
setTimeout(() => el('term').focus(), 100);
</script>
</body>
</html>
