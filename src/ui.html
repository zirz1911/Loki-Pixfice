<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LOKI PIXFICE — TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #07080f; }
  ::-webkit-scrollbar-thumb { background: #1e2840; }
  ::-webkit-scrollbar-thumb:hover { background: #2a3a50; }
  body { background: #060614; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; }

  @keyframes pixel-glow { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes agent-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Pixel navbar ─────────────────────────────────────────────────────── */
  .header {
    background: #0a0b16;
    border-bottom: 2px solid #1e2840;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .header-logo {
    width: 10px; height: 10px;
    background: #5a8cff;
    box-shadow: 0 0 8px #5a8cff80;
    animation: pixel-glow 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .header-title { display: flex; flex-direction: column; gap: 4px; }
  .header-title .main { font-size: 14px; color: #5a8cff; letter-spacing: 3px; }
  .header-title .sub  { font-size: 7px;  color: #2a3a60; letter-spacing: 2px; }
  .header-divider { width: 2px; height: 36px; background: #1e2840; flex-shrink: 0; }
  .header-target {
    font-size: 8px; color: #8090c0;
    background: #1a2030; border: 1px solid #2a3a50;
    padding: 3px 8px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .header-spacer { flex: 1; }
  .header-nav { display: flex; align-items: center; gap: 18px; }
  .header-nav a {
    font-size: 10px;
    font-family: 'Press Start 2P', monospace;
    color: #5a6a80;
    text-decoration: none;
    border-bottom: 2px solid transparent;
    padding-bottom: 3px;
    letter-spacing: 1px;
    transition: color 0.15s;
  }
  .header-nav a:hover { color: #8090c0; }
  .header-nav a.active { color: #5a8cff; border-bottom-color: #5a8cff; }

  /* Hamburger button */
  .menu-btn {
    display: none;
    background: none;
    border: 1px solid #2a3a50;
    color: #8090c0;
    font-size: 18px;
    padding: 4px 10px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }
  .menu-btn.open { background: #5a8cff20; border-color: #5a8cff60; color: #5a8cff; }

  /* Dropdown */
  .nav-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #0a0b16;
    border-bottom: 2px solid #1e2840;
    z-index: 100;
    flex-direction: column;
  }
  .nav-dropdown.open { display: flex; }
  .nav-dropdown a {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    text-decoration: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #5a6a80;
    border-left: 3px solid transparent;
    border-bottom: 1px solid #1a2030;
    transition: background 0.1s;
  }
  .nav-dropdown a.active { color: #5a8cff; background: #5a8cff10; border-left-color: #5a8cff; }
  .nav-dropdown a:hover { background: #0e1020; }
  .nav-dropdown a .nav-icon { font-size: 18px; }

  /* Sidebar toggle button (mobile only) */
  .sidebar-btn {
    display: none;
    background: none;
    border: 1px solid #2a3a50;
    color: #8090c0;
    font-size: 16px;
    padding: 4px 10px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }
  .sidebar-btn.open { background: #5a8cff20; border-color: #5a8cff60; color: #5a8cff; }

  @media (max-width: 640px) {
    /* Header */
    .header { padding: 8px 12px; gap: 8px; position: relative; flex-wrap: nowrap; overflow: hidden; }
    .header-title .main { font-size: 10px; letter-spacing: 1px; }
    .header-title .sub { display: none; }
    .header-divider { display: none; }
    .header-target { display: none; }
    .header-nav { display: none; }
    .header-status .label { display: none; }
    .menu-btn { display: block; }
    .sidebar-btn { display: block; }

    /* Container full width */
    .container { height: calc(100vh - 50px); overflow: hidden; }

    /* Sidebar hidden by default, overlays from left */
    .sidebar {
      position: fixed;
      top: 50px;
      left: -220px;
      bottom: 0;
      width: 200px;
      z-index: 80;
      transition: left 0.2s ease;
      border-right: 2px solid #1e2840;
    }
    .sidebar.open { left: 0; }

    /* Terminal takes full width */
    .term { width: 100%; }
    .term-output { font-size: 12px; padding: 8px 10px; }

    /* Fix iOS auto-zoom on input tap (must be >= 16px) */
    .term-input-line { font-size: 16px; padding: 10px 10px; }
    .term-input-line .prompt { font-size: 16px; }

    /* Key bar scrolls horizontally */
    .key-bar { overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; padding: 5px 8px; }
    .key-bar::-webkit-scrollbar { display: none; }
  }
  .header-status { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-status .dot {
    width: 10px; height: 10px;
    background: #ff6b6b;
    animation: agent-pulse 0.8s ease-in-out infinite;
  }
  .header-status .dot.online {
    background: #4caf50;
    animation: pixel-glow 2s ease-in-out infinite;
  }
  .header-status .label { font-size: 9px; color: #ff6b6b; }
  .header-status .label.online { color: #4caf50; }

  .container { display: flex; height: calc(100vh - 59px); }

  .sidebar { width: 220px; border-right: 2px solid #1a2030; overflow-y: auto; flex-shrink: 0; background: #07080f; }
  .session { margin: 0; }
  .session-name {
    padding: 8px 14px 5px;
    font-size: 8px; text-transform: uppercase; color: #2a3a50; letter-spacing: 2px;
    font-family: 'Press Start 2P', monospace;
    border-bottom: 1px solid #1a2030;
  }
  .window {
    padding: 8px 12px 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    border-left: 3px solid transparent; margin: 1px 0;
    font-family: 'Press Start 2P', monospace;
    transition: background 0.1s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(90, 140, 255, 0.2);
  }
  .window:hover { background: #0e1020; border-left-color: #2a3a50; }
  .window.selected { background: #101828; border-left-color: #5a8cff; }
  .window .idx { color: #2a3a50; font-size: 8px; width: 14px; text-align: right; }
  .window .name { color: #5a6a80; font-size: 9px; }
  .window:hover .name { color: #8090c0; }
  .window.selected .name { color: #5a8cff; }
  .window .dot { width: 7px; height: 7px; background: #1e2840; margin-left: auto; flex-shrink: 0; }
  .window .dot.active { background: #4caf50; box-shadow: 0 0 5px #4caf5080; }

  /* Terminal pane — the whole right side */
  .term {
    flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
    cursor: text;
  }
  .term:focus { outline: none; }
  .term-output {
    flex: 1; padding: 12px 16px; overflow-y: auto;
    background: #07080f; font-size: 13px; line-height: 1.45;
    white-space: pre-wrap; word-break: break-all; color: #cdd6f4;
  }
  .term-output .placeholder {
    color: #2a3a50; text-align: center; margin-top: 30vh; font-size: 11px;
    font-family: 'Press Start 2P', monospace; letter-spacing: 2px;
  }

  /* Input line */
  .term-input-line {
    padding: 8px 14px; border-top: 2px solid #1e2840; background: #0a0b16;
    font-size: 13px; min-height: 34px; display: flex; align-items: center;
    color: #22d3ee;
  }
  .term-input-line .prompt { color: #22d3ee; margin-right: 8px; font-size: 13px; }
  .term-input-line .text { color: #e0e8ff; white-space: pre; }
  .term-input-line .cursor {
    display: inline-block; width: 7px; height: 15px; background: #64b5f6;
    animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 1px;
  }
  .term-input-line.empty .cursor { background: #333; }
  .term-input-line .clear-btn {
    margin-left: auto; color: #555; cursor: pointer; font-size: 11px;
    padding: 2px 8px; border-radius: 3px; user-select: none;
  }
  .term-input-line .clear-btn:hover { color: #f44336; background: #1a1a2e; }
  .term-input-line.empty .clear-btn { display: none; }
  .term-input-line .queue-count {
    margin-left: 8px; color: #555; font-size: 11px;
  }
  .term-input-line.empty .queue-count { display: none; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Key button bar */
  .key-bar {
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    padding: 5px 14px;
    background: #080910;
    border-top: 1px solid #1a2030;
    flex-shrink: 0;
  }
  .key-btn {
    padding: 3px 7px;
    background: #0e1220;
    border: 1px solid #2a3a5066;
    color: #5a8cff99;
    font-size: 7px;
    font-family: 'Press Start 2P', monospace;
    cursor: pointer;
    box-shadow: 2px 2px 0 #000;
    user-select: none;
    transition: all 0.08s;
    flex-shrink: 0;
  }
  .key-btn:hover { background: #1a2240; color: #5a8cff; border-color: #5a8cff; box-shadow: 0 0 6px #5a8cff60, 2px 2px 0 #000; }
  .key-btn:active { transform: scale(0.95); }
  .key-btn.accent { background: #1a0e20; border-color: #5a8cff80; color: #5a8cffcc; }
  .key-btn.accent:hover { background: #1a2240; color: #5a8cff; border-color: #5a8cff; }
  .key-bar-divider { width: 1px; height: 16px; background: #1a2030; flex-shrink: 0; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: #0a1820; color: #4caf50;
    border: 2px solid #4caf5060;
    padding: 8px 16px; font-size: 9px;
    font-family: 'Press Start 2P', monospace;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    box-shadow: 4px 4px 0 #000;
  }
  .toast.error { background: #180a0a; color: #ff6b6b; border-color: #ff6b6b60; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-logo"></div>
  <div class="header-title">
    <span class="main">LOKI PIXFICE</span>
    <span class="sub">TERMINAL</span>
  </div>
  <div class="header-divider"></div>
  <span class="header-target" id="targetName">— NO TARGET —</span>
  <div class="header-spacer"></div>
  <nav class="header-nav">
    <a href="/office/#office">OFFICE</a>
    <a href="/office/#fleet">FLEET</a>
    <a href="/office/#mission">MISSION</a>
    <a href="/office/#overview">OVERVIEW</a>
    <a href="/office/#game">GAME</a>
    <a href="/" class="active">TERMINAL</a>
  </nav>
  <div class="header-divider"></div>
  <div class="header-status" id="statusWrap">
    <div class="dot" id="statusDot"></div>
    <span class="label" id="statusLabel">DISC</span>
  </div>
  <button class="sidebar-btn" id="sidebarBtn" onclick="toggleSidebar()">☰</button>
  <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">⋯</button>
  <div class="nav-dropdown" id="navDropdown">
    <a href="/office/#office"><span class="nav-icon">🏢</span>OFFICE</a>
    <a href="/office/#fleet"><span class="nav-icon">🚀</span>FLEET</a>
    <a href="/office/#mission"><span class="nav-icon">🌌</span>MISSION</a>
    <a href="/office/#overview"><span class="nav-icon">📊</span>OVERVIEW</a>
    <a href="/office/#game"><span class="nav-icon">🎮</span>GAME</a>
    <a href="/" class="active"><span class="nav-icon">💻</span>TERMINAL</a>
  </div>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="term" id="term" tabindex="0">
    <!-- Hidden input: triggers soft keyboard on mobile -->
    <input id="mobileInput" type="text" inputmode="text"
      autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
      style="position:absolute;width:1px;height:1px;opacity:0;top:0;left:0;border:0;padding:0;font-size:16px;pointer-events:none;">
    <div class="term-output" id="output"><div class="placeholder">select a window &larr;</div></div>
    <div class="term-input-line empty" id="inputLine">
      <span class="prompt">&gt;</span>
      <span class="text" id="inputText"></span><span class="cursor"></span>
      <span class="queue-count" id="queueCount"></span>
      <span class="clear-btn" id="clearBtn">esc</span>
    </div>
    <div class="key-bar">
      <button class="key-btn" onclick="sendKey('\x1b')" title="Escape">ESC</button>
      <button class="key-btn" onclick="sendKey('\t')" title="Tab">TAB ⇥</button>
      <button class="key-btn" onclick="sendKey('\x1b[A')" title="Up">↑</button>
      <button class="key-btn" onclick="sendKey('\x1b[B')" title="Down">↓</button>
      <button class="key-btn" onclick="sendKey('\x1b[D')" title="Left">←</button>
      <button class="key-btn" onclick="sendKey('\x1b[C')" title="Right">→</button>
      <button class="key-btn" onclick="sendKey('\x1b[H')" title="Home">HOME</button>
      <button class="key-btn" onclick="sendKey('\x1b[F')" title="End">END</button>
      <button class="key-btn" onclick="sendKey('\x1b[5~')" title="Page Up">PGUP</button>
      <button class="key-btn" onclick="sendKey('\x1b[6~')" title="Page Down">PGDN</button>
      <div class="key-bar-divider"></div>
      <button class="key-btn accent" onclick="sendKey('\x03')" title="Ctrl+C — interrupt">^C</button>
      <button class="key-btn accent" onclick="sendKey('\x04')" title="Ctrl+D — EOF/exit">^D</button>
      <button class="key-btn accent" onclick="sendKey('\x1a')" title="Ctrl+Z — suspend">^Z</button>
      <button class="key-btn accent" onclick="sendKey('\r')" title="Enter">ENTER ↵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Mobile sidebar toggle ────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarBtn');
  const open = sidebar.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '✕' : '☰';
}
// Close sidebar on outside tap
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarBtn');
  if (!sidebar || !btn) return;
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== btn) {
    sidebar.classList.remove('open');
    btn.classList.remove('open');
    btn.textContent = '☰';
  }
});

// ── Mobile menu ──────────────────────────────────────────────────────────────
function toggleMenu() {
  const btn = document.getElementById('menuBtn');
  const dd  = document.getElementById('navDropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '✕' : '☰';
}
// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  const dd = document.getElementById('navDropdown');
  const btn = document.getElementById('menuBtn');
  if (!dd || !btn) return;
  if (!dd.contains(e.target) && e.target !== btn) {
    dd.classList.remove('open');
    btn.classList.remove('open');
    btn.textContent = '☰';
  }
});

// ANSI
const AC = ['#000','#c00','#0a0','#c50','#00c','#c0c','#0cc','#ccc','#555','#f55','#5f5','#ff5','#55f','#f5f','#5ff','#fff'];
function a256(n) {
  if (n < 16) return AC[n];
  if (n < 232) { n -= 16; return `rgb(${Math.floor(n/36)*51},${Math.floor(n/6)%6*51},${n%6*51})`; }
  const v = (n-232)*10+8; return `rgb(${v},${v},${v})`;
}
function ansi(text) {
  let h='',fg=null,bg=null,b=0,d=0,i=0,u=0,s=0,open=0;
  for (const p of text.split(/(\x1b\[[0-9;]*m)/)) {
    const m = p.match(/^\x1b\[([0-9;]*)m$/);
    if (!m) { h += esc(p); continue; }
    if (open) { h += '</span>'; open = 0; }
    const codes = m[1] ? m[1].split(';').map(Number) : [0];
    for (let j=0; j<codes.length; j++) {
      const c=codes[j];
      if (!c) { fg=bg=null; b=d=i=u=s=0; }
      else if (c===1) b=1; else if (c===2) d=1; else if (c===3) i=1;
      else if (c===4) u=1; else if (c===9) s=1;
      else if (c===22) b=d=0; else if (c===23) i=0; else if (c===24) u=0; else if (c===29) s=0;
      else if (c>=30&&c<=37) fg=AC[c-30];
      else if (c===38&&codes[j+1]===5) { fg=a256(codes[j+2]); j+=2; }
      else if (c===38&&codes[j+1]===2) { fg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===39) fg=null;
      else if (c>=40&&c<=47) bg=AC[c-40];
      else if (c===48&&codes[j+1]===5) { bg=a256(codes[j+2]); j+=2; }
      else if (c===48&&codes[j+1]===2) { bg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===49) bg=null;
      else if (c>=90&&c<=97) fg=AC[c-82];
      else if (c>=100&&c<=107) bg=AC[c-92];
    }
    const st=[];
    if (fg) st.push('color:'+fg); if (bg) st.push('background:'+bg+';display:inline;padding:1px 0;box-decoration-break:clone;-webkit-box-decoration-break:clone');
    if (b) st.push('font-weight:bold'); if (d) st.push('opacity:0.6');
    if (i) st.push('font-style:italic');
    if (u||s) st.push('text-decoration:'+(u?'underline':'')+(u&&s?' ':'')+(s?'line-through':''));
    if (st.length) { h += `<span style="${st.join(';')}">`; open=1; }
  }
  if (open) h += '</span>';
  return h;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// State
let ws = null, selectedTarget = null, inputBuf = '', lastSessions = '';

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    el('statusDot').className = 'dot online';
    el('statusLabel').className = 'label online';
    el('statusLabel').textContent = 'LIVE';
    if (selectedTarget) ws.send(JSON.stringify({ type: 'subscribe', target: selectedTarget }));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'sessions') renderSidebar(data.sessions);
    else if (data.type === 'capture') {
      const out = el('output');
      const atBottom = out.scrollHeight - out.scrollTop - out.clientHeight < 60;
      out.innerHTML = ansi(data.content || '(empty)');
      if (atBottom) out.scrollTop = out.scrollHeight;
    }
    else if (data.type === 'sent') showToast('sent');
    else if (data.type === 'error') showToast(data.error, true);
  };
  ws.onclose = () => {
    el('statusDot').className = 'dot';
    el('statusLabel').className = 'label';
    el('statusLabel').textContent = 'DISC';
    setTimeout(connect, 1000);
  };
  ws.onerror = () => ws.close();
}

function el(id) { return document.getElementById(id); }

// Sidebar
function renderSidebar(sessions) {
  const json = JSON.stringify(sessions);
  if (lastSessions === json) {
    document.querySelectorAll('.window').forEach(e => e.classList.toggle('selected', e.dataset.target === selectedTarget));
    return;
  }
  lastSessions = json;
  const sb = el('sidebar');
  sb.innerHTML = sessions.map(s => `<div class="session">
    <div class="session-name">${esc(s.name)}</div>
    ${s.windows.map(w => {
      const t = s.name+':'+w.index;
      return `<div class="window ${selectedTarget===t?'selected':''}" data-target="${t}" data-name="${esc(w.name)}">
        <span class="idx">${w.index}</span><span class="name">${esc(w.name)}</span>
        <span class="dot ${w.active?'active':''}"></span></div>`;
    }).join('')}</div>`).join('');
  // click handled by delegated listener on #sidebar (survives innerHTML replacement)
}

function selectWindow(target, name) {
  selectedTarget = target;
  inputBuf = '';
  updateInputLine();
  el('targetName').textContent = name || target;
  el('output').innerHTML = '<div class="placeholder">connecting...</div>';
  document.querySelectorAll('.window').forEach(e => e.classList.toggle('selected', e.dataset.target === target));
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'subscribe', target }));
    ws.send(JSON.stringify({ type: 'select', target }));
  }
  if (!isMobile) el('term').focus(); // mobile: ไม่ focus อัตโนมัติ ไม่งั้น keyboard เด้ง
  // Persist selection in URL hash
  location.hash = encodeURIComponent(target);
  // Auto-close sidebar on mobile after selecting a window
  const sidebar = document.getElementById('sidebar');
  const sidebarBtn = document.getElementById('sidebarBtn');
  if (sidebar && sidebar.classList.contains('open')) {
    sidebar.classList.remove('open');
    if (sidebarBtn) { sidebarBtn.classList.remove('open'); sidebarBtn.textContent = '☰'; }
  }
}

// Keyboard → tmux (queue-based)
let sendQueue = [];
let sending = false;

function updateInputLine() {
  el('inputText').textContent = inputBuf;
  const hasContent = inputBuf || sendQueue.length;
  el('inputLine').classList.toggle('empty', !hasContent && !selectedTarget);
  el('queueCount').textContent = sendQueue.length ? `(${sendQueue.length} queued)` : '';
}

async function flushQueue() {
  if (sending || !ws || ws.readyState !== 1) return;
  sending = true;
  while (sendQueue.length > 0) {
    const text = sendQueue.shift();
    ws.send(JSON.stringify({ type: 'send', target: selectedTarget, text }));
    updateInputLine();
    // Small delay between queued sends so tmux can process
    await new Promise(r => setTimeout(r, 100));
  }
  sending = false;
}

function queueSend(text) {
  if (!text || !selectedTarget) return;
  sendQueue.push(text);
  updateInputLine();
  flushQueue();
}

function clearInput() {
  inputBuf = '';
  sendQueue = [];
  updateInputLine();
}

el('term').addEventListener('keydown', (e) => {
  // Alt+Arrow to navigate between windows in same session
  if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    if (!selectedTarget) return;
    const wins = [...document.querySelectorAll('.window')].map(el => ({ target: el.dataset.target, name: el.dataset.name }));
    const idx = wins.findIndex(w => w.target === selectedTarget);
    if (idx < 0) return;
    const dir = e.key === 'ArrowLeft' ? -1 : 1;
    const next = wins[(idx + dir + wins.length) % wins.length];
    selectWindow(next.target, next.name);
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'select', target: next.target }));
    return;
  }

  if (!selectedTarget || !ws || ws.readyState !== 1) return;

  if (e.key === 'Enter') {
    e.preventDefault();
    if (inputBuf) {
      queueSend(inputBuf);
      inputBuf = '';
      updateInputLine();
    }
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    if (e.metaKey || e.ctrlKey) {
      // Cmd+Backspace or Ctrl+Backspace = clear whole line
      inputBuf = '';
    } else {
      inputBuf = inputBuf.slice(0, -1);
    }
    updateInputLine();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    clearInput();
  } else if (e.key === 'c' && e.ctrlKey) {
    // Ctrl+C = clear
    e.preventDefault();
    clearInput();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    queueSend(inputBuf + '\t');
    inputBuf = '';
    updateInputLine();
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    inputBuf += e.key;
    updateInputLine();
  }
});

// Paste handler — works anywhere on the page
document.addEventListener('paste', (e) => {
  if (!selectedTarget || !ws || ws.readyState !== 1) return;
  e.preventDefault();
  const text = e.clipboardData?.getData('text') ?? '';
  if (!text) return;
  const lines = text.split(/\r?\n/);
  if (lines.length === 1) {
    // single line — add to buffer
    inputBuf += text;
    updateInputLine();
  } else {
    // multiline — send complete lines, keep last remainder in buffer
    const firstLine = inputBuf + lines[0];
    queueSend(firstLine);
    for (let i = 1; i < lines.length - 1; i++) queueSend(lines[i]);
    inputBuf = lines[lines.length - 1];
    updateInputLine();
  }
  focusTerm();
});

// Key button bar — send special key directly (bypasses queue)
function sendKey(seq) {
  if (!selectedTarget || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'send', target: selectedTarget, text: seq }));
  // ไม่ focusTerm() — บน mobile จะทำให้ keyboard เด้งขึ้นโดยไม่ต้องการ
}

// Clear button
el('clearBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  clearInput();
  focusTerm();
});

// ── Mobile keyboard support ──────────────────────────────────────────────────
const isMobile = 'ontouchstart' in window;

function focusTerm() {
  if (isMobile) el('mobileInput').focus();
  else el('term').focus();
}

// Desktop: click term → focus div
el('term').addEventListener('click', () => { if (!isMobile) el('term').focus(); });

// Mobile: tap input line → focus hidden input → soft keyboard opens
el('inputLine').addEventListener('touchend', (e) => {
  e.preventDefault();
  focusTerm();
});

// Mobile input: keydown (Enter, Backspace, Escape, Ctrl combos)
el('mobileInput').addEventListener('keydown', (e) => {
  if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    if (!selectedTarget) return;
    const wins = [...document.querySelectorAll('.window')].map(el => ({ target: el.dataset.target, name: el.dataset.name }));
    const idx = wins.findIndex(w => w.target === selectedTarget);
    if (idx < 0) return;
    const dir = e.key === 'ArrowLeft' ? -1 : 1;
    const next = wins[(idx + dir + wins.length) % wins.length];
    selectWindow(next.target, next.name);
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'select', target: next.target }));
    return;
  }
  if (!selectedTarget || !ws || ws.readyState !== 1) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    if (inputBuf) { queueSend(inputBuf); inputBuf = ''; updateInputLine(); }
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    if (e.metaKey || e.ctrlKey) inputBuf = '';
    else inputBuf = inputBuf.slice(0, -1);
    updateInputLine();
  } else if (e.key === 'Escape') {
    e.preventDefault(); clearInput();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    queueSend(inputBuf + '\t'); inputBuf = ''; updateInputLine();
  }
});

// Mobile input: input event — captures typed characters
el('mobileInput').addEventListener('input', () => {
  const val = el('mobileInput').value;
  el('mobileInput').value = '';
  if (!val || !selectedTarget || !ws || ws.readyState !== 1) return;
  inputBuf += val;
  updateInputLine();
});

function showToast(msg, error = false) {
  const t = el('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 1500);
}

// Event delegation on sidebar — survives innerHTML replacements
// (per-element listeners were destroyed when renderSidebar reset innerHTML)
document.getElementById('sidebar').addEventListener('click', (e) => {
  const win = e.target.closest('.window');
  if (win) selectWindow(win.dataset.target, win.dataset.name);
});

// Restore selection from URL hash
if (location.hash) {
  const saved = decodeURIComponent(location.hash.slice(1));
  if (saved) { selectedTarget = saved; }
}
connect();
if (!isMobile) setTimeout(() => el('term').focus(), 100); // mobile: ไม่ auto-focus
</script>
