<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maw — Orchestra Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4e; }

  body {
    background: #0a0a0f; color: #e0e0e0;
    font-family: 'SF Pro', -apple-system, system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* --- Hero Header --- */
  .hero {
    text-align: center; padding: 60px 20px 40px;
    position: relative;
  }
  .hero h1 {
    font-size: 48px; font-weight: 200; letter-spacing: 12px; text-transform: uppercase;
    background: linear-gradient(135deg, #26c6da 0%, #7e57c2 50%, #ffa726 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .subtitle {
    margin-top: 12px; font-size: 13px; color: #666; letter-spacing: 3px; text-transform: uppercase;
  }
  .hero .stats {
    margin-top: 16px; display: flex; justify-content: center; gap: 24px; font-size: 13px;
  }
  .nav-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 16px;
    padding: 10px 24px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px;
  }
  .nav-bar .brand { font-size: 16px; font-weight: bold; color: #26c6da; letter-spacing: 4px; text-transform: uppercase; }
  .nav-bar .links { margin-left: auto; display: flex; gap: 18px; }
  .nav-bar .links a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
  .nav-bar .links a:hover { color: rgba(255,255,255,0.8); }
  .nav-bar .links a.active { color: #26c6da; font-weight: bold; }
  .hero .stat { color: #888; }
  .hero .stat strong { color: #e0e0e0; font-weight: 600; }
  .conn-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #4caf50; margin-right: 6px; vertical-align: middle;
  }
  .conn-dot.offline { background: #ef5350; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .conn-dot.live { animation: pulse-dot 2s ease-in-out infinite; }

  /* --- Orbital Section --- */
  .orbital-section {
    display: flex; justify-content: center; padding: 20px 20px 40px;
  }
  .orbital-container {
    position: relative; width: 600px; height: 600px;
  }

  /* Center hub */
  .orbital-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .hub {
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle, #1a1a2e, #0d0d14);
    border: 2px solid #26c6da; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative; z-index: 2;
  }
  .hub-label { font-size: 16px; font-weight: 600; color: #26c6da; letter-spacing: 2px; }
  .hub-sub { font-size: 9px; color: #555; letter-spacing: 1px; margin-top: 2px; }

  .resonance {
    position: absolute; border-radius: 50%; border: 1px solid rgba(38, 198, 218, 0.25);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .r1 { width: 90px; height: 90px; animation: res 4s ease-in-out infinite; }
  .r2 { width: 90px; height: 90px; animation: res 4s ease-in-out 1.3s infinite; }
  .r3 { width: 90px; height: 90px; animation: res 4s ease-in-out 2.6s infinite; }
  @keyframes res {
    0% { width: 90px; height: 90px; opacity: 0.6; }
    100% { width: 220px; height: 220px; opacity: 0; }
  }

  /* Orbital rings */
  .orbital-ring {
    position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.04);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Agent nodes */
  .node {
    position: absolute; width: 60px; height: 60px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
    z-index: 5; text-decoration: none;
  }
  .node:hover { transform: scale(1.15); }
  .node-inner {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 2px solid var(--node-color, #555);
    background: radial-gradient(circle at 30% 30%, var(--node-bg, #1a1a2e), #0a0a0f);
  }
  .node-name {
    font-size: 9px; font-weight: 600; color: var(--node-color, #888);
    text-align: center; line-height: 1.1; max-width: 48px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .node-idx { font-size: 8px; color: #555; margin-top: 1px; }
  .node.active .node-inner { box-shadow: 0 0 12px rgba(76, 175, 80, 0.4); }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 8px var(--glow-color, rgba(76,175,80,0.3)); }
    50% { box-shadow: 0 0 20px var(--glow-color, rgba(76,175,80,0.6)); }
  }
  .node.active .node-inner { animation: glow 3s ease-in-out infinite; }

  /* Node tooltip */
  .node-tooltip {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #e0e0e0; padding: 3px 8px; border-radius: 4px;
    font-size: 10px; white-space: nowrap; opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 20;
  }
  .node:hover .node-tooltip { opacity: 1; }

  /* --- Section Headers --- */
  .section-header {
    text-align: center; padding: 40px 20px 24px;
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #555; font-weight: 400;
  }
  .section-header::after {
    content: ''; display: block; width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #333, transparent);
    margin: 12px auto 0;
  }

  /* --- Agent Cards --- */
  .cards-section { max-width: 1050px; margin: 0 auto; padding: 0 24px 60px; }
  .session-group { margin-bottom: 32px; }
  .session-group-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 0; margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cards-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }
  .agent-card {
    background: #0d0d14; border: 1px solid rgba(255,255,255,0.06);
    border-left: 3px solid var(--card-color, #555);
    border-radius: 8px; padding: 16px; cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    position: relative; overflow: hidden;
  }
  .agent-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 25px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.12);
    border-left-color: var(--card-color, #555);
  }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--card-color, #e0e0e0); }
  .card-target { font-size: 11px; color: #555; margin-left: auto; font-family: 'SF Mono', monospace; }
  .card-status {
    width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0;
  }
  .card-status.active { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.5); }
  .card-preview {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
    color: #555; line-height: 1.4; height: 32px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }

  /* --- Modal --- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-content {
    width: 90vw; max-width: 900px; height: 80vh;
    background: #0a0a0f; border: 1px solid #1a1a2e; border-radius: 12px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  .modal-header {
    padding: 12px 16px; border-bottom: 1px solid #1a1a2e;
    display: flex; align-items: center; gap: 12px;
  }
  .modal-title { font-size: 14px; font-weight: 600; }
  .modal-close {
    margin-left: auto; background: none; border: none; color: #555;
    font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: #ef5350; }
  .modal-term {
    flex: 1; padding: 8px 12px; overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    line-height: 1.35; white-space: pre-wrap; word-break: break-all; color: #aaa;
  }
  .modal-input {
    padding: 6px 12px; border-top: 1px solid #1a1a2e; background: #0d0d14;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    display: flex; align-items: center; min-height: 28px;
  }
  .modal-input .prompt { color: #555; margin-right: 6px; }
  .modal-input .text { color: #e0e0e0; white-space: pre; }
  .modal-input .cursor {
    display: inline-block; width: 7px; height: 15px; background: #64b5f6;
    animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: #1a3a1a;
    color: #4caf50; padding: 8px 14px; border-radius: 6px; font-size: 12px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
  }
  .toast.error { background: #3a1a1a; color: #ef5350; }
  .toast.show { opacity: 1; }

  /* --- Link to terminal --- */
  .footer-link {
    text-align: center; padding: 0 0 40px; font-size: 12px;
  }
  .footer-link a { color: #555; text-decoration: none; }
  .footer-link a:hover { color: #26c6da; }

  /* --- Responsive --- */
  @media (max-width: 700px) {
    .orbital-section { display: none; }
    .cards-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 32px; letter-spacing: 8px; }
  }
  @media (min-width: 701px) and (max-width: 1000px) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
    .orbital-container { width: 450px; height: 450px; }
  }
</style>
</head>
<body>

<!-- Nav Bar -->
<div class="nav-bar">
  <span class="brand">Oracle Orbital</span>
  <div class="links">
    <a href="/office/#office">Office</a>
    <a href="/office/#mission">Mission</a>
    <a href="/">Terminal</a>
    <a href="/dashboard" class="active">Orbital</a>
  </div>
</div>

<!-- Hero -->
<div class="hero" style="padding-top: 80px;">
  <h1>maw</h1>
  <div class="subtitle">multi-agent workflow orchestra</div>
  <div class="stats">
    <span class="stat"><span class="conn-dot" id="connDot"></span><span id="connLabel">connecting</span></span>
    <span class="stat"><strong id="agentCount">0</strong> agents</span>
    <span class="stat"><strong id="sessionCount">0</strong> sessions</span>
  </div>
</div>

<!-- Orbital Map -->
<div class="orbital-section">
  <div class="orbital-container" id="orbitalContainer">
    <div class="orbital-center">
      <div class="resonance r1"></div>
      <div class="resonance r2"></div>
      <div class="resonance r3"></div>
      <div class="hub">
        <div class="hub-label">maw</div>
        <div class="hub-sub">orchestra</div>
      </div>
    </div>
  </div>
</div>

<!-- Section: Agents -->
<div class="section-header">Agents — One Soul, Many Windows</div>

<!-- Agent Cards -->
<div class="cards-section" id="cardsSection"></div>

<!-- Footer link -->
<div class="footer-link"><a href="/">open terminal ui &rarr;</a></div>

<!-- Terminal Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-term" id="modalTerm"></div>
    <div class="modal-input" id="modalInput">
      <span class="prompt">&gt;</span>
      <span class="text" id="modalInputText"></span><span class="cursor"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- Session color map ---
const SESSION_COLORS = {
  '0':          { color: '#26c6da', bg: '#0e2028', rgb: '38,198,218' },
  '1-oracles':  { color: '#7e57c2', bg: '#1a1430', rgb: '126,87,194' },
  '2-domain':   { color: '#42a5f5', bg: '#0e1a28', rgb: '66,165,245' },
  '3-research': { color: '#ffa726', bg: '#2e1e10', rgb: '255,167,38' },
};
const FALLBACK_COLORS = [
  { color: '#ef5350', bg: '#2e1010', rgb: '239,83,80' },
  { color: '#4caf50', bg: '#102e10', rgb: '76,175,80' },
  { color: '#fdd835', bg: '#2e2e10', rgb: '253,216,53' },
  { color: '#ab47bc', bg: '#2e102e', rgb: '171,71,188' },
];
function sessionColor(name) {
  if (SESSION_COLORS[name]) return SESSION_COLORS[name];
  // Hash to pick a fallback
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return FALLBACK_COLORS[Math.abs(h) % FALLBACK_COLORS.length];
}

// --- ANSI parser (from ui.html) ---
const AC = ['#000','#c00','#0a0','#c50','#00c','#c0c','#0cc','#ccc','#555','#f55','#5f5','#ff5','#55f','#f5f','#5ff','#fff'];
function a256(n) {
  if (n < 16) return AC[n];
  if (n < 232) { n -= 16; return `rgb(${Math.floor(n/36)*51},${Math.floor(n/6)%6*51},${n%6*51})`; }
  const v = (n-232)*10+8; return `rgb(${v},${v},${v})`;
}
function ansi(text) {
  let h='',fg=null,bg=null,b=0,d=0,i=0,u=0,s=0,open=0;
  for (const p of text.split(/(\x1b\[[0-9;]*m)/)) {
    const m = p.match(/^\x1b\[([0-9;]*)m$/);
    if (!m) { h += esc(p); continue; }
    if (open) { h += '</span>'; open = 0; }
    const codes = m[1] ? m[1].split(';').map(Number) : [0];
    for (let j=0; j<codes.length; j++) {
      const c=codes[j];
      if (!c) { fg=bg=null; b=d=i=u=s=0; }
      else if (c===1) b=1; else if (c===2) d=1; else if (c===3) i=1;
      else if (c===4) u=1; else if (c===9) s=1;
      else if (c===22) b=d=0; else if (c===23) i=0; else if (c===24) u=0; else if (c===29) s=0;
      else if (c>=30&&c<=37) fg=AC[c-30];
      else if (c===38&&codes[j+1]===5) { fg=a256(codes[j+2]); j+=2; }
      else if (c===38&&codes[j+1]===2) { fg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===39) fg=null;
      else if (c>=40&&c<=47) bg=AC[c-40];
      else if (c===48&&codes[j+1]===5) { bg=a256(codes[j+2]); j+=2; }
      else if (c===48&&codes[j+1]===2) { bg=`rgb(${codes[j+2]},${codes[j+3]},${codes[j+4]})`; j+=4; }
      else if (c===49) bg=null;
      else if (c>=90&&c<=97) fg=AC[c-82];
      else if (c>=100&&c<=107) bg=AC[c-92];
    }
    const st=[];
    if (fg) st.push('color:'+fg); if (bg) st.push('background:'+bg+';display:inline;padding:1px 0;box-decoration-break:clone;-webkit-box-decoration-break:clone');
    if (b) st.push('font-weight:bold'); if (d) st.push('opacity:0.6');
    if (i) st.push('font-style:italic');
    if (u||s) st.push('text-decoration:'+(u?'underline':'')+(u&&s?' ':'')+(s?'line-through':''));
    if (st.length) { h += `<span style="${st.join(';')}">`; open=1; }
  }
  if (open) h += '</span>';
  return h;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripAnsi(s) { return s.replace(/\x1b\[[0-9;]*m/g, ''); }

// --- State ---
let ws = null;
let sessions = [];
let modalTarget = null;
let modalInputBuf = '';
let agentPreviews = {}; // target -> last line

// --- WebSocket ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById('connDot').className = 'conn-dot live';
    document.getElementById('connLabel').textContent = 'live';
    if (modalTarget) ws.send(JSON.stringify({ type: 'subscribe', target: modalTarget }));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'sessions') {
      sessions = data.sessions;
      renderAll();
    } else if (data.type === 'capture' && modalTarget) {
      const term = document.getElementById('modalTerm');
      const atBottom = term.scrollHeight - term.scrollTop - term.clientHeight < 60;
      term.innerHTML = ansi(data.content || '(empty)');
      if (atBottom) term.scrollTop = term.scrollHeight;
    } else if (data.type === 'sent') {
      showToast('sent');
    } else if (data.type === 'error') {
      showToast(data.error, true);
    }
  };
  ws.onclose = () => {
    document.getElementById('connDot').className = 'conn-dot offline';
    document.getElementById('connLabel').textContent = 'reconnecting';
    setTimeout(connect, 1000);
  };
  ws.onerror = () => ws.close();
}

// --- Render ---
function renderAll() {
  let totalAgents = 0;
  sessions.forEach(s => totalAgents += s.windows.length);
  document.getElementById('agentCount').textContent = totalAgents;
  document.getElementById('sessionCount').textContent = sessions.length;
  renderOrbital();
  renderCards();
  pollPreviews();
}

// --- Orbital ---
function renderOrbital() {
  const container = document.getElementById('orbitalContainer');
  // Remove old nodes and rings (keep center)
  container.querySelectorAll('.node, .orbital-ring').forEach(el => el.remove());

  const rect = container.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const baseRadius = Math.min(cx, cy) * 0.35;
  const ringStep = Math.min(cx, cy) * 0.22;

  sessions.forEach((session, si) => {
    const sc = sessionColor(session.name);
    const radius = baseRadius + si * ringStep;

    // Draw ring
    const ring = document.createElement('div');
    ring.className = 'orbital-ring';
    ring.style.width = ring.style.height = (radius * 2) + 'px';
    ring.style.borderColor = sc.color.replace(')', ',0.08)').replace('rgb', 'rgba');
    container.appendChild(ring);

    // Place nodes
    session.windows.forEach((win, wi) => {
      const angle = (2 * Math.PI * wi) / session.windows.length - Math.PI / 2;
      const x = cx + radius * Math.cos(angle) - 30;
      const y = cy + radius * Math.sin(angle) - 30;

      const node = document.createElement('div');
      node.className = 'node' + (win.active ? ' active' : '');
      node.style.left = x + 'px';
      node.style.top = y + 'px';
      node.style.setProperty('--node-color', sc.color);
      node.style.setProperty('--node-bg', sc.bg);
      node.style.setProperty('--glow-color', `rgba(${sc.rgb},0.4)`);

      const target = session.name + ':' + win.index;
      node.innerHTML = `
        <div class="node-tooltip">${esc(win.name)}</div>
        <div class="node-inner">
          <div class="node-name">${esc(win.name.replace('-oracle','').replace('-',' '))}</div>
          <div class="node-idx">${session.name}:${win.index}</div>
        </div>`;
      node.addEventListener('click', () => openModal(target, win.name, sc.color));
      container.appendChild(node);
    });
  });
}

// --- Cards ---
function renderCards() {
  const section = document.getElementById('cardsSection');
  section.innerHTML = '';

  sessions.forEach(session => {
    const sc = sessionColor(session.name);
    const group = document.createElement('div');
    group.className = 'session-group';

    const title = document.createElement('div');
    title.className = 'session-group-title';
    title.style.color = sc.color;
    title.textContent = session.name;
    group.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    session.windows.forEach(win => {
      const target = session.name + ':' + win.index;
      const card = document.createElement('div');
      card.className = 'agent-card';
      card.style.setProperty('--card-color', sc.color);
      card.dataset.target = target;

      const preview = agentPreviews[target] || '';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-status ${win.active ? 'active' : ''}"></div>
          <div class="card-name">${esc(win.name)}</div>
          <div class="card-target">${esc(target)}</div>
        </div>
        <div class="card-preview" id="preview-${CSS.escape(target)}">${esc(preview)}</div>`;
      card.addEventListener('click', () => openModal(target, win.name, sc.color));
      grid.appendChild(card);
    });

    group.appendChild(grid);
    section.appendChild(group);
  });
}

// --- Preview polling ---
let pollTimer = null;
async function pollPreviews() {
  if (pollTimer) clearTimeout(pollTimer);
  const targets = [];
  sessions.forEach(s => s.windows.forEach(w => targets.push(s.name + ':' + w.index)));

  // Fetch in small batches
  for (let i = 0; i < targets.length; i += 4) {
    const batch = targets.slice(i, i + 4);
    await Promise.allSettled(batch.map(async (target) => {
      try {
        const res = await fetch(`/api/capture?target=${encodeURIComponent(target)}`);
        const data = await res.json();
        const lines = stripAnsi(data.content || '').split('\n').filter(l => l.trim());
        const lastLine = lines.slice(-1)[0] || '';
        agentPreviews[target] = lastLine.slice(0, 120);
        // Update card preview if exists
        const el = document.getElementById('preview-' + CSS.escape(target));
        if (el) el.textContent = agentPreviews[target];
      } catch {}
    }));
  }

  pollTimer = setTimeout(pollPreviews, 6000);
}

// --- Modal ---
function openModal(target, name, color) {
  modalTarget = target;
  modalInputBuf = '';
  document.getElementById('modalTitle').textContent = name + ' — ' + target;
  document.getElementById('modalTitle').style.color = color;
  document.getElementById('modalTerm').innerHTML = '<div style="color:#333;text-align:center;margin-top:20vh">connecting...</div>';
  document.getElementById('modalInputText').textContent = '';
  document.getElementById('modal').classList.add('open');

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'subscribe', target }));
  }

  // Focus for keyboard
  document.getElementById('modal').focus();
}

function closeModal() {
  modalTarget = null;
  modalInputBuf = '';
  document.getElementById('modal').classList.remove('open');
  // Unsubscribe
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'subscribe', target: '' }));
  }
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// --- Keyboard (modal) ---
document.addEventListener('keydown', (e) => {
  if (!modalTarget) return;

  if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }

  if (e.key === 'Enter') {
    e.preventDefault();
    if (modalInputBuf && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'send', target: modalTarget, text: modalInputBuf }));
      modalInputBuf = '';
      document.getElementById('modalInputText').textContent = '';
    }
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    if (e.metaKey || e.ctrlKey) modalInputBuf = '';
    else modalInputBuf = modalInputBuf.slice(0, -1);
    document.getElementById('modalInputText').textContent = modalInputBuf;
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    modalInputBuf = '';
    document.getElementById('modalInputText').textContent = '';
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    modalInputBuf += e.key;
    document.getElementById('modalInputText').textContent = modalInputBuf;
  }
});

// --- Toast ---
function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 1500);
}

// --- Init ---
connect();
</script>
